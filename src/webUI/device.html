<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Solar2MQTT Device</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <canvas id="particleCanvas"></canvas>

  <div id="container">
    <div id="header">
      <a href="/"><img id="logo" src="/logo.svg" alt="Solar2MQTT Logo"></a>
      <h1>Device Settings</h1>
    </div>

    <div id="statusbar"></div>

    <form id="deviceForm" class="panel">
      <div class="panel-title">Hardware Serial</div>
      <p class="hint">ESP32 HardwareSerial with pin mapping instead of SoftwareSerial.</p>

      <div class="detailSplitter">UART / RS485</div>
      <label>UART RX Pin</label>
      <input name="uartRx" type="number">

      <label>UART TX Pin</label>
      <input name="uartTx" type="number">

      <label>RS485 DIR Pin</label>
      <input name="uartDir" type="number">

      <div class="detailSplitter">Status LED</div>
      <label>Status LED Pin</label>
      <input name="statusLedPin" type="number">

      <label for="statusLedBrightness">Status LED Brightness</label>
      <div class="range-row">
        <input id="statusLedBrightness" name="statusLedBrightness" type="range" min="0" max="255" step="1">
        <span id="statusLedBrightnessValue" class="range-value">128</span>
      </div>

      <label>Poll Interval [ms]</label>
      <input name="pollIntervalMs" type="number">

      <div class="detailSplitter">Default D1 Mini Layout</div>
      <div class="kv"><span class="k">D6 / RX</span><span class="v">GPIO19</span></div>
      <div class="kv"><span class="k">D7 / TX</span><span class="v">GPIO23</span></div>
      <div class="kv"><span class="k">D5 / DIR</span><span class="v">GPIO18</span></div>
      <div class="kv"><span class="k">D4 / LED</span><span class="v">GPIO2</span></div>

      <div class="button-stack" style="margin-top: 14px;">
        <button type="submit" class="btn">Apply</button>
        <a class="btn btn-outline" href="/menu">Back</a>
      </div>
    </form>

    <div class="panel">
      <div class="panel-title">Live Link</div>
      <div class="kv"><span class="k">Protocol</span><span class="v" id="deviceProtocol">-</span></div>
      <div class="kv"><span class="k">PV Power</span><span class="v" id="metricPvPower">-</span></div>
      <div class="kv"><span class="k">Battery Voltage</span><span class="v" id="metricBatteryVoltage">-</span></div>
    </div>
  </div>

  <div id="toast"><span id="toast-icon">i</span><span id="toast-msg"></span></div>
  <script src="/statusbar.js"></script>
  <script src="/backgroundCanvas.js"></script>
  <script src="/app.js"></script>
</body>
</html>
