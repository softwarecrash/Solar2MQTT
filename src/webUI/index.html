<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Solar2MQTT Status</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <canvas id="particleCanvas"></canvas>

  <div id="container">
    <div id="header">
      <a href="/"><img id="logo" src="/logo.svg" alt="Solar2MQTT Logo"></a>
      <h1><span id="pageTitleDevice">Solar2MQTT</span></h1>
    </div>

    <div id="statusbar"></div>

    <div class="panel status-overview-panel">
      <div class="detailSplitter">Energy Overview</div>
      <div class="meter-grid">
        <div class="value-meter" id="meterBatteryCard">
          <div class="meter-head">
            <span>Battery</span>
            <strong id="meterBatteryValue">-</strong>
          </div>
          <div class="progress meter-progress">
            <div id="meterBatteryBar" class="progress-bar meter-bar"></div>
          </div>
          <div class="meter-meta" id="meterBatteryMeta">Waiting for data</div>
        </div>
        <div class="value-meter" id="meterLoadCard">
          <div class="meter-head">
            <span>Load</span>
            <strong id="meterLoadValue">-</strong>
          </div>
          <div class="progress meter-progress">
            <div id="meterLoadBar" class="progress-bar meter-bar meter-bar-load"></div>
          </div>
          <div class="meter-meta" id="meterLoadMeta">Waiting for data</div>
        </div>
        <div class="value-meter" id="meterSolarCard">
          <div class="meter-head">
            <span>Solar</span>
            <strong id="meterSolarValue">-</strong>
          </div>
          <div class="progress meter-progress">
            <div id="meterSolarBar" class="progress-bar meter-bar meter-bar-solar"></div>
          </div>
          <div class="meter-meta" id="meterSolarMeta">Waiting for data</div>
        </div>
        <div class="value-meter" id="meterChargeCard">
          <div class="meter-head">
            <span id="meterChargeLabel">Charge</span>
            <strong id="meterChargeValue">-</strong>
          </div>
          <div class="progress meter-progress">
            <div id="meterChargeBar" class="progress-bar meter-bar meter-bar-charge"></div>
          </div>
          <div class="meter-meta" id="meterChargeMeta">Waiting for data</div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="detailSplitter">Inverter Overview</div>
      <div id="overviewRows" class="overview-list">
        <div class="overview-empty">Waiting for inverter data.</div>
      </div>
    </div>

    <div class="button-stack">
      <a class="btn btn-outline" href="/menu">Settings</a>
    </div>
  </div>

  <div id="toast"><span id="toast-icon">i</span><span id="toast-msg"></span></div>
  <script src="/statusbar.js"></script>
  <script src="/backgroundCanvas.js"></script>
  <script src="/app.js"></script>
</body>
</html>
