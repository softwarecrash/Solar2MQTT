<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Solar2MQTT Reboot</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <canvas id="particleCanvas"></canvas>

  <div id="container">
    <div id="header">
      <a href="/"><img id="logo" src="/logo.svg" alt="Solar2MQTT Logo"></a>
      <h1>Reboot</h1>
    </div>

    <div id="statusbar"></div>

    <div class="panel">
      <div class="panel-title">Restart Device</div>
      <p class="hint">Used for settings changes, firmware updates, and troubleshooting.</p>

      <div class="button-stack" style="margin-top: 14px;">
        <button id="rebootNowBtn" type="button" class="btn">Reboot Now</button>
        <a class="btn btn-outline" href="/">Back to Status</a>
      </div>
    </div>
  </div>

  <div id="toast"><span id="toast-icon">i</span><span id="toast-msg"></span></div>
  <script src="/statusbar.js"></script>
  <script src="/backgroundCanvas.js"></script>
  <script src="/app.js"></script>
</body>
</html>
