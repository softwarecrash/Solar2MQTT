[platformio]
default_envs = wemos_d1_mini32

[env]
custom_source_name = Solar2MQTT
custom_source_version = 2.0.0-dev-7
custom_ota_owner = softwarecrash
custom_ota_repo = Solar2MQTT
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = partitions/min_no_spiffs.csv
build_unflags =
	-std=gnu++11
build_flags =
	-include include/sdkconfig_bt_disable.h
	-DVERSION=${this.custom_source_version}
	-DSTRVERSION=\""${this.custom_source_version}"\"
	-DMONITOR_SPEED=${this.monitor_speed}
	-DSOURCE_NAME=\""${this.custom_source_name}"\"
	-DOTA_GITHUB_OWNER=\""${this.custom_ota_owner}"\"
	-DOTA_GITHUB_REPO=\""${this.custom_ota_repo}"\"
	-DCONFIG_ASYNC_TCP_STACK_SIZE=4096
	-DARDUINOJSON_USE_DOUBLE=1
	-DARDUINOJSON_USE_LONG_LONG=1
	-std=gnu++17
extra_scripts =
	pre:tools/pre_build.py
	tools/merge_firmware.py
lib_deps =
	bblanchon/ArduinoJson
	ESP32Async/AsyncTCP
	ESP32Async/ESPAsyncWebServer
	mathieucarbou/MycilaDS18
	mathieucarbou/MycilaWebSerial
	hmueller01/pubsubclient3

[env:wemos_d1_mini32]
board = wemos_d1_mini32
build_flags =
	${env.build_flags}
	-DBUILD_VARIANT=\"wemos_d1_mini32\"
	-DHAS_LAN=0
	-DPIN_LED_STATUS=2
	-DPIN_INVERTER_RX_DEFAULT=19
	-DPIN_INVERTER_TX_DEFAULT=23
	-DPIN_INVERTER_DE_DEFAULT=18
	-DPIN_DS18B20=21

[env:wemos_d1_mini32_dbg]
board = wemos_d1_mini32
monitor_filters = esp32_exception_decoder, default, printable, colorize
build_flags =
	${env.build_flags}
	-DBUILD_VARIANT=\"wemos_d1_mini32_dbg\"
	-DHAS_LAN=0
	-DPIN_LED_STATUS=2
	-DPIN_INVERTER_RX_DEFAULT=19
	-DPIN_INVERTER_TX_DEFAULT=23
	-DPIN_INVERTER_DE_DEFAULT=18
	-DPIN_DS18B20=21
	-DCORE_DEBUG_LEVEL=3

; ESP32-C3 SuperMini without Ethernet.
; Native USB uses GPIO18/19, so these stay untouched.
; Default pins avoid strapping pins where practical.
[env:esp32c3_supermini]
board = nologo_esp32c3_super_mini
upload_protocol = esptool
monitor_filters = esp32_exception_decoder, default, printable, colorize
build_flags =
	${env.build_flags}
	-DBUILD_VARIANT=\"esp32c3_supermini\"
	-DHAS_LAN=0
	-DPIN_LED_STATUS=-1
	-DPIN_INVERTER_RX_DEFAULT=20
	-DPIN_INVERTER_TX_DEFAULT=21
	-DPIN_INVERTER_DE_DEFAULT=10
	-DPIN_DS18B20=3
	-DARDUINO_USB_CDC_ON_BOOT=1

; ESP32-S3 SuperMini without Ethernet.
; Pin mapping kept fully within GPIO1..16 as available on the solder pads.
; Native USB on ESP32-S3 uses GPIO19/20, so these stay untouched.
[env:esp32s3_supermini]
board = esp32-s3-devkitc-1
upload_protocol = esptool
monitor_filters = esp32_exception_decoder, default, printable, colorize
build_flags =
	${env.build_flags}
	-DBUILD_VARIANT=\"esp32s3_supermini\"
	-DHAS_LAN=0
	-DPIN_LED_STATUS=-1
	-DPIN_INVERTER_RX_DEFAULT=16
	-DPIN_INVERTER_TX_DEFAULT=15
	-DPIN_INVERTER_DE_DEFAULT=7
	-DPIN_DS18B20=6
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1

[env:waveshare_esp32_s3_eth]
board = esp32-s3-devkitc1-n16r8
upload_protocol = esptool
monitor_filters = esp32_exception_decoder, default, printable, colorize
build_flags =
	${env.build_flags}
	-DBUILD_VARIANT=\"waveshare_esp32_s3_eth\"
	-DHAS_LAN=1
	-DETH_SPI_W5500=1
	-DPIN_LED_STATUS=-1
	-DPIN_INVERTER_RX_DEFAULT=17
	-DPIN_INVERTER_TX_DEFAULT=18
	-DPIN_INVERTER_DE_DEFAULT=15
	-DPIN_DS18B20=21
	-DPIN_ETH_SPI_MISO=12
	-DPIN_ETH_SPI_MOSI=11
	-DPIN_ETH_SPI_SCLK=13
	-DPIN_ETH_SPI_CS=14
	-DPIN_ETH_SPI_RST=9
	-DPIN_ETH_SPI_INT=10
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
